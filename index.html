<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascend</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
    <header>
        <img src="assets/images/logo.png" alt="Ascend Logo" class="logo">
        <div class="user-progress">
            <p>Lvl. 5</p>
            <p>XP: 1200/2000</p>
        </div>
        <div class="user-profile">
            <img src="assets/images/profile.jpg" alt="Profile Picture">
            <p>Username</p>
        </div>

    </header>
    <main>
        <section class="dashboard-grid">
            <h2>Dashboard</h2>
            <div class="dashboard-cards">
                <section class="dashboard-card">
                    
                    <h3>Level</h3>
                    <p>5</p>
                </section>
                <section class="dashboard-card">
                    
                    <h3>Xp</h3>
                    <p>1200/2000</p>
                </section>
                <section class="dashboard-card">
                    
                    <h3>Current Streak</h3>
                    <p>7 days</p>
                </section>
                <section class="dashboard-card">
                    
                    <h3>total workouts</h3>
                    <p>24</p>
                </section>
            </div>
        </section>
        <div class="content-grid">
        <section class="muscles-grid">
            <h3>Muscles</h3>
            <div class="muscles-cards">
                <article class="muscle-card">
                    <h4>Chest</h4>
                </article>
                <article class="muscle-card">
                    <h4>Triceps</h4>
                </article>
                <article class="muscle-card">
                    <h4>Back</h4>
                </article>
                <article class="muscle-card">
                    <h4>Trapezius</h4>
                </article>
                <article class="muscle-card">
                    <h4>Biceps</h4>
                </article>
                <article class="muscle-card">
                    <h4>Shoulders</h4>
                </article>
                <article class="muscle-card">
                    <h4>Forearms</h4>
                </article>
                <article class="muscle-card">
                    <h4>Legs</h4>
                </article>
                <article class="muscle-card">
                    <h4>Glutes</h4>
                </article>
                <article class="muscle-card">
                    <h4>Calves</h4>
                </article>
                <article class="muscle-card">
                    <h4>Abs</h4>
                </article>

            </div>
        </section>
        <section class="classifications-grid">
            <h2>Classifications</h2>
        </section>
    </div>
    </main>
    <footer>
        <p>&copy; 2026 Ascend. All rights reserved.</p>
    </footer>
</body>

</html>
