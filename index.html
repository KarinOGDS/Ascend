<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascend</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
    <header>
        <img src="assets/images/logo.png" alt="Ascend Logo">
        <p>Level</p>
        <p>Xp</p>
        <p>Profile</p>
    </header>
    <main>
        <section class="dashboard-grid">
            <h2>Dashboard</h2>
            <div class="dashboard-cards">
                <section>
                    <h3>Level</h3>
                </section>
                <section>
                    <h3>Xp</h3>
                </section>
                <section>
                    <h3>Current Streak</h3>
                </section>
                <section>
                    <h3>total workouts</h3>
                </section>
            </div>
        </section>
        <section class="muscles-grid">
            <h3>Muscles</h3>
            <div class="muscles-cards">
                <article class="muscle-card">
                    <h4>Chest</h4>
                </article>
                <article class="muscle-card">
                    <h4>Triceps</h4>
                </article>
                <article class="muscle-card">
                    <h4>Back</h4>
                </article>
                <article class="muscle-card">
                    <h4>Trapezius</h4>
                </article>
                <article class="muscle-card">
                    <h4>Biceps</h4>
                </article>
                <article class="muscle-card">
                    <h4>Shoulders</h4>
                </article>
                <article class="muscle-card">
                    <h4>Forearms</h4>
                </article>
                <article class="muscle-card">
                    <h4>Legs</h4>
                </article>
                <article class="muscle-card">
                    <h4>Glutes</h4>
                </article>
                <article class="muscle-card">
                    <h4>Calves</h4>
                </article>
                <article class="muscle-card">
                    <h4>Abs</h4>
                </article>

            </div>
        </section>
        <section class="classifications-grid">
            <h2>Classifications</h2>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Ascend. All rights reserved.</p>
    </footer>
</body>

</html>
