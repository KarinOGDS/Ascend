<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chest</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>


    <!-- ==========================================================
     MUSCLE HERO
========================================================== -->
    <section class="muscle-hero">
        <div class="muscle-hero__background">
            <img src="assets/images/muscles/chest.png" alt="Chest">
        </div>

        <div class="muscle-hero__overlay"></div>
        <div class="muscle-hero__content">
            <div class="muscle-hero__empty"></div>
            <div class="muscle-hero__info">
                <span class="muscle-hero__eyebrow">
                    Muscle Progress
                </span>
                <div class="muscle-hero__header">
                    <div>
                        <h1 class="muscle-hero__title">
                            Chest
                        </h1>
                        <p class="muscle-hero__rank">
                            Novice
                        </p>
                    </div>
                    <div class="muscle-hero__level">
                        <span class="muscle-hero__level-label">
                            LV.
                        </span>
                        <span class="muscle-hero__level-value">
                            12
                        </span>
                    </div>
                </div>
                <div class="muscle-hero__progress">
                    <div class="muscle-hero__progress-header">
                        <span>
                            Current XP
                        </span>
                        <strong>
                            1,240 / 2,000 XP
                        </strong>
                    </div>
                    <div class="muscle-hero__bar">
                        <div class="muscle-hero__bar-fill" style="width:62%;">
                        </div>
                    </div>
                </div>
                <div class="muscle-hero__stats">
                    <div class="hero-stat">
                        <span class="hero-stat__label">
                            Last Workout
                        </span>
                        <strong class="hero-stat__value">
                            Yesterday
                        </strong>
                    </div>
                    <div class="hero-stat">
                        <span class="hero-stat__label">
                            Workouts
                        </span>
                        <strong class="hero-stat__value">
                            38
                        </strong>
                    </div>
                    <div class="hero-stat">
                        <span class="hero-stat__label">
                            Completion
                        </span>
                        <strong class="hero-stat__value">
                            62%
                        </strong>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- ==========================================================
     EXERCISE HERO
========================================================== -->

    <article class="exercise-hero">
        <button class="exercise-hero__button">
            <header class="exercise-hero__header">
                <div class="exercise-hero__title-group">
                    <h2 class="exercise-hero__title">
                        Bench Press
                    </h2>
                    <p class="exercise-hero__description">
                        Build upper body strength and chest mass.
                    </p>
                </div>
                <span class="exercise-hero__muscle">
                    ● Chest
                </span>
            </header>

            <section class="exercise-hero__performance">
                <article class="exercise-hero__stat">
                    <span class="exercise-hero__label">
                        Latest
                    </span>
                    <strong class="exercise-hero__number">
                        90 × 8
                    </strong>
                    <span class="exercise-hero__caption">
                        Weight × Reps
                    </span>
                </article>
                <article class="exercise-hero__stat">
                    <span class="exercise-hero__label">
                        Personal Record
                    </span>
                    <strong class="exercise-hero__number">
                        95 × 5
                    </strong>
                    <span class="exercise-hero__caption">
                        Weight × Reps
                    </span>
                </article>
            </section>
            <footer class="exercise-hero__footer">
                <div class="exercise-hero__status">
                    <span class="exercise-hero__status-label">
                        Last Performed
                    </span>
                    <strong class="exercise-hero__status-value">
                        Yesterday
                    </strong>
                </div>
                <div class="exercise-hero__goal">
                    <span class="exercise-hero__goal-label">
                        Next Goal
                    </span>
                    <strong class="exercise-hero__goal-value">
                        95 × 6
                    </strong>
                </div>
                <div class="exercise-hero__indicator">
                    <span class="exercise-hero__indicator-text">
                        Ready
                    </span>
                    <span class="exercise-hero__indicator-arrow">
                        →
                    </span>
                </div>
            </footer>
        </button>
    </article>



</body>

</html>
